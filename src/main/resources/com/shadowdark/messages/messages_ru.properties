//ANCESTRY BONUS DESCRIPTIONS
ancestry_stout=Крепкий. Начинаете с +{0} ОЗ. Броски на очки здоровья при повышении уровня выполняются с преимуществом.
ancestry_farsight=Дальнозоркость. Получаете +1 к броскам атаки дальнобойным оружием или +1 к проверкам колдовства.
ancestry_keenSenses=Острые чувства. Вас нельзя застать врасплох.
ancestry_mighty=Могучий. Получаете +1 к броскам атаки и урона в ближнем бою.
ancestry_stealthy=Хитрый. Раз в день можете стать невидимым на 3 раунда.
ancestry_ambitious=Амбициозный. Получаете один дополнительный бросок на талант на 1-м уровне.
ancestry_dwarf_name=Дварф
ancestry_dwarf_desc=Храбрый, стойкий народ, столь же прочный, как каменные королевства, которые они высекают в горах.
ancestry_elf_name=Эльф
ancestry_elf_desc=Эфирные, грациозные создания, почитающие знания и красоту. Обладают острым зрением и долгой жизнью.
ancestry_goblin_name=Гоблин
ancestry_goblin_desc=Зеленокожие, хитрые существа, процветающие в темных и тесных местах. Несмотря на малый рост, они свирепы.
ancestry_half_orc_name=Полуорк
ancestry_half_orc_desc=Высокие, клыкастые воины, столь же отважные, как люди, и столь же неумолимые, как орки.
ancestry_halfling_name=Полурослик
ancestry_halfling_desc=Маленький, жизнерадостный народ с озорным нравом. Полурослики наслаждаются простыми радостями жизни.
ancestry_human_name=Человек
ancestry_human_desc=Смелые, гибкие и разносторонние существа, быстро обучающиеся и совершающие великие подвиги.
